{% extends "base.html" %}
{% block body %}
<div style="max-width: 420px; margin: 60px auto;">
    <div class="card">
        <div class="card-title">Create Account</div>
        
        {% if error %}
            <div class="alert alert-err">
                <strong>Error:</strong> {{ error }}
            </div>
        {% endif %}
        
        {% if success %}
            <div class="alert alert-info">
                <strong>Success:</strong> Account created! <a href="/login" style="color: var(--accent); font-weight:600;">Log in now</a>.
            </div>
        {% endif %}
        
        <form method="POST" action="/register">
            <div style="margin-bottom: 18px;">
                <label style="display: block; margin-bottom: 8px; font-size: 0.8rem; font-weight: 600; color: var(--text-dim);">USERNAME (3+ characters)</label>
                <input type="text" name="username" placeholder="e.g. analyst1" required style="width: 100%;">
            </div>
            
            <div style="margin-bottom: 18px;">
                <label style="display: block; margin-bottom: 8px; font-size: 0.8rem; font-weight: 600; color: var(--text-dim);">PASSWORD (8+ characters)</label>
                <input type="password" name="password" placeholder="••••••••" required style="width: 100%;">
            </div>
            
            <div style="margin-bottom: 24px;">
                <label style="display: block; margin-bottom: 8px; font-size: 0.8rem; font-weight: 600; color: var(--text-dim);">CONFIRM PASSWORD</label>
                <input type="password" name="password2" placeholder="••••••••" required style="width: 100%;">
            </div>
            
            <button type="submit" style="width: 100%; padding: 12px; margin-bottom: 16px;">REGISTER ACCOUNT</button>
        </form>
        
        <div style="text-align: center; font-size: 0.8rem; color: var(--text-dim);">
            Already have an account? <a href="/login" style="color: var(--accent); text-decoration: none; font-weight: 600;">Log in here</a>
        </div>
    </div>
</div>
{% endblock %}
